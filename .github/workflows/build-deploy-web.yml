name: Build and Deploy Web to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'src/web/**'
      - '.github/workflows/build-deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ vars.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ vars.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "REGISTRY_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/src/web
          acrName: ${{ vars.ACR_NAME }}
          acrUsername: ${{ env.REGISTRY_USERNAME }}
          acrPassword: ${{ env.REGISTRY_PASSWORD }}
          containerAppName: todomanagement-web
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          containerAppEnvironment: cae-todomanagement-dev
          runtimeStack: node:18
          targetPort: 5173
          environmentVariables: |
            VITE_API_BASE_URL=${{ vars.API_BASE_URL }}
            VITE_AZURE_CLIENT_ID=${{ vars.AZURE_CLIENT_ID }}
            VITE_AZURE_AUTHORITY=https://login.microsoftonline.com/${{ vars.AZURE_TENANT_ID }}
            VITE_AZURE_REDIRECT_URI=${{ vars.AZURE_REDIRECT_URI }}

      - name: Configure Container App identity for ACR access
        run: |
          echo "Assigning User Assigned Identity to Container App..."
          az containerapp identity assign \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name todomanagement-web \
            --user-assigned ${{ vars.USER_ASSIGNED_IDENTITY_ID }}
          
          echo "Configuring registry access with UAI..."
          az containerapp registry set \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name todomanagement-web \
            --server ${{ vars.ACR_NAME }}.azurecr.io \
            --identity ${{ vars.USER_ASSIGNED_IDENTITY_ID }}
