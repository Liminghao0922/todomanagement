name: Build and Deploy API to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image todomanagement-api:latest \
            --file src/api/Dockerfile \
            src/api

      - name: Deploy to Container App
        run: |
          az containerapp up \
            --name todomanagement-api \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --environment cae-todomanagement-dev \
            --image ${{ vars.ACR_NAME }}.azurecr.io/todomanagement-api:latest \
            --target-port 8000 \
            --ingress external \
            --user-assigned-identity ${{ vars.USER_ASSIGNED_IDENTITY_ID }} \
            --registry-server ${{ vars.ACR_NAME }}.azurecr.io \
            --registry-identity ${{ vars.USER_ASSIGNED_IDENTITY_ID }} \
            --env-vars POSTGRES_SERVER="${{ vars.POSTGRES_SERVER }}" \
                        POSTGRES_DB="${{ vars.POSTGRES_DB }}" \
                        POSTGRES_USER="${{ vars.POSTGRES_USER }}" \
                        DATABASE_TYPE="postgresql" \
                        ENVIRONMENT="production"